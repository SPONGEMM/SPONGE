name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  release-sponge-conda:
    name: Release conda package (${{ matrix.feature }} / ${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - feature: cpu
            env_name: dev-cpu
            target: linux-aarch64
            runner: ubuntu-24.04-arm
          - feature: cpu
            env_name: dev-cpu
            target: linux-64
            runner: ubuntu-22.04
          - feature: cpu-mpi
            env_name: dev-cpu-mpi
            target: linux-aarch64
            runner: ubuntu-24.04-arm
          - feature: cpu-mpi
            env_name: dev-cpu-mpi
            target: linux-64
            runner: ubuntu-22.04
          - feature: cuda12
            env_name: dev-cuda12
            target: linux-64
            runner: ubuntu-22.04
          - feature: cuda13
            env_name: dev-cuda13
            target: linux-64
            runner: ubuntu-22.04
          - feature: cpu
            env_name: dev-cpu
            target: win-64
            runner: windows-2022
          - feature: cpu
            env_name: dev-cpu
            target: osx-arm64
            runner: macos-14
          - feature: cuda12
            env_name: dev-cuda12
            target: win-64
            runner: windows-2022
          - feature: cuda13
            env_name: dev-cuda13
            target: win-64
            runner: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Pixi
        uses: prefix-dev/setup-pixi@v0.9.4
        with:
          run-install: false

      - name: Build conda package(s)
        run: |
          pixi install -e ${{ matrix.env_name }}
          pixi run -e ${{ matrix.env_name }} configure
          pixi run -e ${{ matrix.env_name }} compile
          pixi run -e ${{ matrix.env_name }} package-conda

      - name: Stage conda artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-artifacts/conda
          cp packaging/outputs/*.conda release-artifacts/conda/

      - name: Upload conda artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sponge-conda-${{ matrix.feature }}-${{ matrix.target }}
          path: release-artifacts/conda/*.conda
          if-no-files-found: error

  release-prips-sdist:
    name: Release PRIPS sdist
    runs-on: ubuntu-22.04
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Pixi
        uses: prefix-dev/setup-pixi@v0.9.4
        with:
          run-install: false

      - name: Build PRIPS sdist
        run: |
          pixi install -e dev-cpu
          pixi run -e dev-cpu prips-build

      - name: Verify PRIPS sdist install with pip
        run: |
          pixi run -e dev-cpu pip install --force-reinstall plugins/prips/dist/*.tar.gz

      - name: Upload PRIPS package with Twine
        env:
          TWINE_REPOSITORY_URL: ${{ secrets.TWINE_REPOSITORY_URL }}
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: |
          pixi run -e dev-cpu pip install --disable-pip-version-check twine
          pixi run -e dev-cpu twine upload plugins/prips/dist/*.tar.gz

      - name: Stage PRIPS artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-artifacts/prips
          cp plugins/prips/dist/*.tar.gz release-artifacts/prips/

      - name: Upload PRIPS sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: prips-sdist
          path: release-artifacts/prips/*.tar.gz
          if-no-files-found: error

  release-windows-msi:
    name: Release Windows MSI
    runs-on: windows-2022
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Pixi
        uses: prefix-dev/setup-pixi@v0.9.4
        with:
          run-install: false

      - name: Build Windows CPU binaries
        shell: pwsh
        run: |
          pixi install -e dev-cpu
          pixi run -e dev-cpu configure
          pixi run -e dev-cpu compile

      - name: Install WiX Toolset
        shell: pwsh
        run: |
          choco install wixtoolset --no-progress -y

      - name: Build MSI package
        shell: pwsh
        run: |
          .\packaging\windows\cpu.ps1 -EnvName dev-cpu -Tag "${{ github.ref_name }}"

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: sponge-msi-cpu-win-64
          path: release-artifacts/msi/*.msi
          if-no-files-found: error

  release-docker:
    name: Release Docker image (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: cpu-x64
            dockerfile: packaging/docker/cpu-x64.Dockerfile
            platform: linux/amd64
            runner: ubuntu-22.04
          - name: cpu-arm64
            dockerfile: packaging/docker/cpu-arm64.Dockerfile
            platform: linux/arm64
            runner: ubuntu-24.04-arm
          - name: cuda12-x64
            dockerfile: packaging/docker/cuda12-x64.Dockerfile
            platform: linux/amd64
            runner: ubuntu-22.04
          - name: cuda13-x64
            dockerfile: packaging/docker/cuda13-x64.Dockerfile
            platform: linux/amd64
            runner: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Classify release channel
        id: channel
        shell: bash
        run: |
          if [[ "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "stable=true" >> "${GITHUB_OUTPUT}"
          else
            echo "stable=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Setup Pixi
        uses: prefix-dev/setup-pixi@v0.9.4
        with:
          run-install: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Derive image name
        id: image
        shell: bash
        run: |
          namespace="${DOCKERHUB_USERNAME,,}"
          echo "name=${namespace}/sponge" >> "${GITHUB_OUTPUT}"
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          flavor: |
            latest=false
          tags: |
            type=raw,value=${{ github.ref_name }}-${{ matrix.name }}
            type=raw,value=latest-${{ matrix.name }},enable=${{ steps.channel.outputs.stable == 'true' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        env:
          DOCKER_BUILD_RECORD_UPLOAD: false
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platform }}
          push: true
          provenance: false
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}

      - name: Select release image tag
        id: release_tag
        shell: bash
        run: |
          image_tag="${GITHUB_REF_NAME}-${{ matrix.name }}"
          echo "value=${image_tag}" >> "${GITHUB_OUTPUT}"

      - name: Pull release image
        shell: bash
        run: |
          set -euo pipefail
          docker pull "${{ steps.image.outputs.name }}:${{ steps.release_tag.outputs.value }}"

      - name: Export Docker image tarball
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-artifacts/docker
          docker image save \
            --output "release-artifacts/docker/${{ steps.release_tag.outputs.value }}.tar" \
            "${{ steps.image.outputs.name }}:${{ steps.release_tag.outputs.value }}"

      - name: Install Apptainer with Pixi
        shell: bash
        run: |
          set -euo pipefail
          pixi global install --environment release-apptainer \
            --expose apptainer \
            apptainer \
            --force-reinstall

      - name: Build Apptainer image
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-artifacts/apptainer
          apptainer build \
            "release-artifacts/apptainer/${{ steps.release_tag.outputs.value }}.sif" \
            "docker-archive://$(pwd)/release-artifacts/docker/${{ steps.release_tag.outputs.value }}.tar"

      - name: Remove Apptainer helper environment
        if: always()
        shell: bash
        run: |
          pixi global uninstall release-apptainer || true

      - name: Upload container artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sponge-container-${{ matrix.name }}
          path: |
            release-artifacts/docker/*.tar
            release-artifacts/apptainer/*.sif
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-22.04
    needs:
      - release-sponge-conda
      - release-prips-sdist
      - release-windows-msi
      - release-docker
    permissions:
      contents: write

    steps:
      - name: Classify release channel
        id: channel
        shell: bash
        run: |
          if [[ "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "stable=true" >> "${GITHUB_OUTPUT}"
          else
            echo "stable=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          pattern: "!*.dockerbuild"

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ steps.channel.outputs.stable != 'true' }}
          generate_release_notes: true
          files: |
            release-artifacts/**/*.conda
            release-artifacts/**/*.msi
            release-artifacts/**/*.tar
            release-artifacts/**/*.tar.gz
            release-artifacts/**/*.sif
