name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  release-sponge-conda:
    name: Release conda package (${{ matrix.feature }} / ${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - feature: cpu
            env_name: dev-cpu
            target: linux-aarch64
            runner: ubuntu-24.04-arm
          - feature: cpu
            env_name: dev-cpu
            target: linux-64
            runner: ubuntu-22.04
          - feature: cpu-mpi
            env_name: dev-cpu-mpi
            target: linux-aarch64
            runner: ubuntu-24.04-arm
          - feature: cpu-mpi
            env_name: dev-cpu-mpi
            target: linux-64
            runner: ubuntu-22.04
          - feature: cuda12
            env_name: dev-cuda12
            target: linux-64
            runner: ubuntu-22.04
          - feature: cuda13
            env_name: dev-cuda13
            target: linux-64
            runner: ubuntu-22.04
          - feature: cpu
            env_name: dev-cpu
            target: win-64
            runner: windows-2022
          - feature: cpu
            env_name: dev-cpu
            target: osx-arm64
            runner: macos-14
          - feature: cuda12
            env_name: dev-cuda12
            target: win-64
            runner: windows-2022
          - feature: cuda13
            env_name: dev-cuda13
            target: win-64
            runner: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Pixi
        uses: prefix-dev/setup-pixi@v0.9.4
        with:
          run-install: false

      - name: Build conda package(s)
        run: |
          pixi install -e ${{ matrix.env_name }}
          pixi run -e ${{ matrix.env_name }} configure
          pixi run -e ${{ matrix.env_name }} compile
          pixi run -e ${{ matrix.env_name }} package-conda

      - name: Verify package install with pixi
        shell: bash
        run: |
          set -euo pipefail
          package_path="$(pixi run -e ${{ matrix.env_name }} python -c 'from pathlib import Path; print(sorted(Path("packaging/outputs").glob("*.conda"))[0].resolve())')"
          pixi global install --environment verify-pixi \
            --path "${package_path}" \
            --expose SPONGE \
            --force-reinstall
          command -v SPONGE
          pixi global uninstall verify-pixi || true

      - name: Verify package install with conda
        shell: bash
        run: |
          set -euo pipefail
          package_path="$(pixi run -e ${{ matrix.env_name }} python -c 'from pathlib import Path; print(sorted(Path("packaging/outputs").glob("*.conda"))[0].resolve())')"
          pixi global install --environment verify-conda-exe \
            --expose conda \
            conda \
            --force-reinstall
          conda_env_dir="$(mktemp -d "${RUNNER_TEMP}/sponge-conda-env-XXXXXX")"
          conda create -y -p "${conda_env_dir}" "${package_path}"
          pixi global uninstall verify-conda-exe || true

      - name: Verify package install with mamba
        shell: bash
        run: |
          set -euo pipefail
          package_path="$(pixi run -e ${{ matrix.env_name }} python -c 'from pathlib import Path; print(sorted(Path("packaging/outputs").glob("*.conda"))[0].resolve())')"
          pixi global install --environment verify-mamba-exe \
            --expose mamba \
            mamba \
            --force-reinstall
          mamba_env_dir="$(mktemp -d "${RUNNER_TEMP}/sponge-mamba-env-XXXXXX")"
          mamba_pkgs_dir="$(mktemp -d "${RUNNER_TEMP}/sponge-mamba-pkgs-XXXXXX")"
          CONDA_PKGS_DIRS="${mamba_pkgs_dir}" \
            mamba create -y -p "${mamba_env_dir}" "${package_path}"
          pixi global uninstall verify-mamba-exe || true

      - name: Verify package install with micromamba
        shell: bash
        run: |
          set -euo pipefail
          package_path="$(pixi run -e ${{ matrix.env_name }} python -c 'from pathlib import Path; print(sorted(Path("packaging/outputs").glob("*.conda"))[0].resolve())')"
          pixi global install --environment verify-micromamba-exe \
            --expose micromamba \
            micromamba \
            --force-reinstall
          micromamba_root_dir="$(mktemp -d "${RUNNER_TEMP}/sponge-micromamba-root-XXXXXX")"
          micromamba_env_dir="$(mktemp -d "${RUNNER_TEMP}/sponge-micromamba-env-XXXXXX")"
          MAMBA_ROOT_PREFIX="${micromamba_root_dir}" \
            micromamba create -y -p "${micromamba_env_dir}" "${package_path}"
          pixi global uninstall verify-micromamba-exe || true

      - name: Upload conda artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sponge-conda-${{ matrix.feature }}-${{ matrix.target }}
          path: packaging/outputs/*.conda
          if-no-files-found: error

  release-prips-sdist:
    name: Release PRIPS sdist
    runs-on: ubuntu-22.04
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Pixi
        uses: prefix-dev/setup-pixi@v0.9.4
        with:
          run-install: false

      - name: Build PRIPS sdist
        run: |
          pixi install -e dev-cpu
          pixi run -e dev-cpu prips-build

      - name: Verify PRIPS sdist install with pip
        run: |
          pixi run -e dev-cpu pip install --force-reinstall plugins/prips/dist/*.tar.gz

      - name: Upload PRIPS sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: prips-sdist
          path: plugins/prips/dist/*.tar.gz
          if-no-files-found: error

  release-docker:
    name: Release Docker image (${{ matrix.name }})
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: cpu-x64
            dockerfile: packaging/docker/cpu-x64.Dockerfile
            platform: linux/amd64
          - name: cpu-arm64
            dockerfile: packaging/docker/cpu-arm64.Dockerfile
            platform: linux/arm64
          - name: cuda12-x64
            dockerfile: packaging/docker/cuda12-x64.Dockerfile
            platform: linux/amd64
          - name: cuda13-x64
            dockerfile: packaging/docker/cuda13-x64.Dockerfile
            platform: linux/amd64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Classify release channel
        id: channel
        shell: bash
        run: |
          if [[ "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "stable=true" >> "${GITHUB_OUTPUT}"
          else
            echo "stable=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image name
        id: image
        shell: bash
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          echo "name=ghcr.io/${owner}/sponge" >> "${GITHUB_OUTPUT}"

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          flavor: |
            latest=false
          tags: |
            type=raw,value=${{ github.ref_name }}-${{ matrix.name }}
            type=raw,value=latest-${{ matrix.name }},enable=${{ steps.channel.outputs.stable == 'true' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platform }}
          push: true
          provenance: false
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-22.04
    needs:
      - release-sponge-conda
      - release-prips-sdist
      - release-docker
    permissions:
      contents: write

    steps:
      - name: Classify release channel
        id: channel
        shell: bash
        run: |
          if [[ "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "stable=true" >> "${GITHUB_OUTPUT}"
          else
            echo "stable=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ steps.channel.outputs.stable != 'true' }}
          generate_release_notes: true
          files: |
            release-artifacts/**/*.conda
            release-artifacts/**/*.tar.gz
